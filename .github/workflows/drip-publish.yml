name: Drip Publish

on:
  # schedule:
  #   - cron: '0 8 * * *'   # PAUSED — content quality recovery in progress
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of posts to publish'
        required: false
        default: '2'
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Configure git
        run: |
          git config user.name "DevNook Publisher"
          git config user.email "publisher@devnook.dev"

      - name: Set publish count
        id: set_count
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "count=${{ inputs.count || '2' }}" >> $GITHUB_OUTPUT
          else
            echo "count=2" >> $GITHUB_OUTPUT
          fi

      - name: Run drip publisher
        env:
          DEVNOOK_PATH: site
        run: |
          python pipeline/agents/publish/publish.py --count ${{ steps.set_count.outputs.count }}

      - name: Commit and push changes
        run: |
          git add pipeline/data/registry.db site/src/content/
          if ! git diff --cached --quiet; then
            git commit -m "chore: publish $(date '+%Y-%m-%d') drip posts [skip ci]"
            git push
          fi
